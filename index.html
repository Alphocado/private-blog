---
layout: default
title: Home
---

<section class="post-list">
  <h2>Daftar Artikel</h2>

  {% for post in site.posts %}
  <article class="post-item">
    <h3>
      <a href="{{ post.url }}">{{ post.title }}</a>
    </h3>

    <p class="post-date">{{ post.date | date: "%d %B %Y" }}</p>

    <p class="post-excerpt">{{ post.excerpt }}</p>
  </article>
  {% endfor %}
</section>
